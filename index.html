<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">
<title>TextCraft - 文字排版工具</title>
<style>

:root{--primary:#e8457c;--light:#fff0f3;--gradient:linear-gradient(135deg,#e8457c,#ff8fab);--text:#a01040;--font:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;--radius:14px;--shadow:0 4px 20px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:#f5f5f5;color:#333;max-width:800px;margin:0 auto;padding:16px}
.controls{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;flex-wrap:wrap;gap:10px}
.style-btns{display:flex;gap:6px;flex-wrap:wrap}
.style-btn{padding:6px 14px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;transition:all .2s;font-family:var(--font);color:#666;white-space:nowrap}
.style-btn:hover{border-color:var(--primary);color:var(--primary)}
.style-btn.active{background:var(--gradient);color:#fff;border-color:transparent}
.color-dots{display:flex;gap:8px;align-items:center}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.color-dot:hover{transform:scale(1.15)}
.color-dot.active{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333}
.color-dot[data-c="pink"]{background:#e8457c}
.color-dot[data-c="blue"]{background:#4f6df5}
.color-dot[data-c="green"]{background:#10b981}
.color-dot[data-c="orange"]{background:#f97316}
.color-dot[data-c="purple"]{background:#8b5cf6}
.color-dot[data-c="cyan"]{background:#0ea5e9}
.content{display:none}.content.active{display:block}

/* S1 */
.s1{background:var(--light);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow)}
.s1 .hero{background:var(--gradient);border-radius:12px;padding:28px 24px;color:#fff;text-align:center;margin-bottom:28px}
.s1 .hero h1{font-size:24px;font-weight:700;margin-bottom:6px}
.s1 .hero p{font-size:14px;opacity:.9}
.s1 .stitle{font-size:17px;font-weight:700;color:var(--text);margin:24px 0 14px;padding-left:12px;border-left:4px solid var(--primary)}
.s1 .card{display:flex;align-items:flex-start;gap:14px;background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.s1 .card .num{min-width:36px;height:36px;border-radius:50%;background:var(--gradient);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.s1 .card h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.s1 .card p{font-size:13px;color:#666;line-height:1.7}
.s1 .cbox{background:#fff;border-radius:12px;padding:16px 20px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.s1 .cbox p{font-size:13px;color:#555;line-height:1.8}
.s1 .plist{list-style:none;padding:0}.s1 .plist li{font-size:13px;color:#555;padding:4px 0}.s1 .plist li::before{content:"★";color:var(--primary);margin-right:6px}
.s1 .dbox{background:var(--gradient);border-radius:12px;padding:18px 20px;color:#fff;text-align:center;margin-top:20px}
.s1 .dbox h4{font-size:16px;margin-bottom:8px}.s1 .dbox p{font-size:13px;opacity:.95;line-height:1.8}
.s1 .twrap{margin-top:12px;border-radius:10px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.s1 table{width:100%;border-collapse:collapse;background:#fff}
.s1 th{background:var(--gradient);color:#fff;padding:10px 14px;font-size:13px;text-align:left}
.s1 td{padding:10px 14px;font-size:12px;border-bottom:1px solid #f0f0f0;color:#555}

/* S2 */
.s2{background:#fff;border-radius:var(--radius);padding:32px;box-shadow:var(--shadow)}
.s2 .header{text-align:center;margin-bottom:28px}
.s2 .header h1{font-size:22px;color:var(--primary);font-weight:700}
.s2 .header p{font-size:13px;color:#888;margin-top:6px}
.s2 .sbox{background:var(--light);border-radius:12px;padding:16px 20px;margin-bottom:24px;border-left:4px solid var(--primary)}
.s2 .sbox p{font-size:13px;color:#555;line-height:1.8}
.s2 .pinline{background:var(--light);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:13px;color:var(--text);line-height:1.8}
.s2 .timeline{position:relative;padding-left:28px;margin-bottom:24px}
.s2 .timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:3px;background:var(--gradient);border-radius:3px}
.s2 .tl-item{position:relative;margin-bottom:24px}
.s2 .tl-item::before{content:'';position:absolute;left:-22px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--primary);border:3px solid #fff;box-shadow:0 0 0 2px var(--primary)}
.s2 .tl-item h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px}
.s2 .tl-item .days{display:inline-block;background:var(--primary);color:#fff;font-size:11px;padding:2px 10px;border-radius:10px;margin-bottom:6px}
.s2 .tl-item p{font-size:13px;color:#666;line-height:1.7}
.s2 .tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.s2 .titem{background:var(--light);border-radius:10px;padding:12px 14px;border-left:3px solid var(--primary)}
.s2 .titem strong{font-size:13px;color:var(--text)}.s2 .titem span{font-size:12px;color:#888;display:block;margin-top:2px}
.s2 .rules{text-align:center;padding:18px;background:var(--gradient);border-radius:12px;color:#fff}
.s2 .rules h4{font-size:15px;margin-bottom:6px}.s2 .rules p{font-size:13px;opacity:.95;line-height:1.7}

/* S3 */
.s3{padding:0}
.s3 .bighero{background:var(--gradient);padding:36px 28px;color:#fff;border-radius:var(--radius) var(--radius) 0 0;text-align:center}
.s3 .bighero .emoji{font-size:48px;margin-bottom:12px}.s3 .bighero h1{font-size:24px;font-weight:700}
.s3 .bighero p{font-size:14px;opacity:.9;margin-top:8px;line-height:1.6}
.s3 .bcontent{padding:20px}
.s3 .bc{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.s3 .bc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--gradient)}
.s3 .bc .icon{font-size:32px;margin-bottom:8px}
.s3 .bc h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}
.s3 .bc p{font-size:13px;color:#666;line-height:1.7}
.s3 .pricards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.s3 .pricard{background:#fff;border-radius:12px;padding:14px 10px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.s3 .pricard .rank{width:28px;height:28px;border-radius:50%;background:var(--gradient);color:#fff;font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-bottom:6px}
.s3 .pricard p{font-size:12px;color:#555;line-height:1.5}
.s3 .schedrow{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.s3 .scheditem{flex:1;min-width:140px;background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);text-align:center}
.s3 .scheditem .time{font-size:18px;font-weight:700;color:var(--primary)}.s3 .scheditem .act{font-size:12px;color:#666;margin-top:4px}
.s3 .footer{background:var(--gradient);padding:20px 28px;color:#fff;border-radius:0 0 var(--radius) var(--radius);text-align:center}
.s3 .footer h4{font-size:16px;margin-bottom:8px}.s3 .footer p{font-size:13px;opacity:.95;line-height:1.8}

/* S4 */
.s4{background:#fff;border-radius:var(--radius);padding:40px 36px;box-shadow:var(--shadow)}
.s4 .mintitle{text-align:center;margin-bottom:48px}
.s4 .mintitle h1{font-size:24px;font-weight:700;color:#222;letter-spacing:1px}
.s4 .mintitle .line{width:40px;height:2px;background:var(--primary);margin:16px auto 0}
.s4 .minsec{margin-bottom:20px}
.s4 .minsec .bignum{font-size:48px;font-weight:200;color:var(--primary);opacity:.4;line-height:1}
.s4 .minsec h3{font-size:17px;font-weight:700;color:var(--text);margin:4px 0 10px;letter-spacing:1px}
.s4 .minsec p{font-size:14px;color:#555;line-height:2.2;letter-spacing:.5px}
.s4 .mindiv{border:none;border-top:1px solid #f0f0f0;margin:32px 0}
.s4 .minsched{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:24px 0}
.s4 .mintime strong{font-size:14px;color:var(--text)}.s4 .mintime p{font-size:13px;color:#555;margin-top:2px}
.s4 .minrules{text-align:center;padding:40px 0;margin-top:24px;border-top:1px solid #f0f0f0}
.s4 .minrules p{font-size:15px;color:var(--primary);font-weight:400;letter-spacing:2px;line-height:2.2}

/* S5 */
.s5{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:0;overflow:hidden}
.s5 .mag-header{padding:40px 36px 32px;position:relative;background:var(--gradient);color:#fff;overflow:hidden}
.s5 .mag-header .side-text{position:absolute;right:20px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;font-size:13px;letter-spacing:6px;opacity:.4;font-weight:300}
.s5 .mag-header h1{font-size:26px;font-weight:700;max-width:60%;position:relative;z-index:1}.s5 .mag-header p{font-size:13px;opacity:.85;margin-top:8px;max-width:70%;line-height:1.6}
.s5 .mag-body{padding:28px 28px 28px 36px;position:relative}
.s5 .mag-body .side-deco{position:absolute;left:10px;top:20px;bottom:20px;writing-mode:vertical-rl;font-size:11px;letter-spacing:8px;color:var(--primary);opacity:.2;font-weight:700}
.s5 .mag-sec{margin-bottom:28px}
.s5 .mag-sec h3{font-size:16px;font-weight:700;color:var(--text);border-bottom:2px solid var(--primary);display:inline-block;padding-bottom:4px;margin-bottom:12px}
.s5 .mag-sec p{font-size:13px;color:#555;line-height:1.9}
.s5 .mag-phases{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.s5 .phase{flex:1;min-width:180px;border:1px solid #e8e8e8;border-radius:10px;padding:16px;position:relative}
.s5 .phase .plabel{position:absolute;top:-10px;left:16px;background:var(--primary);color:#fff;font-size:11px;padding:2px 12px;border-radius:10px}
.s5 .phase h4{font-size:14px;color:#222;margin-bottom:6px;margin-top:4px}.s5 .phase p{font-size:12px;color:#666;line-height:1.7}
.s5 .mag-pri{background:var(--light);border-radius:10px;padding:16px 20px;margin-bottom:20px}
.s5 .mag-pri li{font-size:13px;color:#555;padding:3px 0;list-style:none}.s5 .mag-pri li::before{content:"▸ ";color:var(--primary)}
.s5 .mag-sched{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.s5 .mag-time{border-left:3px solid var(--primary);padding-left:12px}
.s5 .mag-time strong{font-size:13px;color:var(--text)}.s5 .mag-time p{font-size:12px;color:#888;margin-top:2px}
.s5 .mag-footer{background:var(--text);color:#fff;padding:20px 28px;text-align:center;position:relative}
.s5 .mag-footer .side-text{position:absolute;right:20px;top:50%;transform:translateY(-50%);writing-mode:vertical-rl;font-size:11px;letter-spacing:6px;opacity:.3}
.s5 .mag-footer h4{font-size:15px;margin-bottom:6px}.s5 .mag-footer p{font-size:13px;opacity:.85;line-height:1.8}

/* S6 */
.s6{background:#fffef5;border-radius:var(--radius);box-shadow:var(--shadow);padding:0;position:relative;background-image:repeating-linear-gradient(transparent,transparent 31px,#e8e4d8 31px,#e8e4d8 32px);background-position:0 20px}
.s6 .note-header{background:var(--gradient);padding:24px 28px;color:#fff;border-radius:var(--radius) var(--radius) 0 0;position:relative}
.s6 .note-header h1{font-size:22px;font-weight:700;text-decoration:underline;text-decoration-style:wavy;text-underline-offset:6px}
.s6 .note-header p{font-size:13px;opacity:.9;margin-top:6px}
.s6 .note-header .tape{position:absolute;top:-6px;right:40px;width:80px;height:20px;background:rgba(255,255,255,.35);transform:rotate(-2deg);border-radius:2px}
.s6 .note-header .tape-2{position:absolute;top:-6px;left:60px;width:60px;height:18px;background:rgba(255,255,255,.2);transform:rotate(3deg);border-radius:2px}
.s6 .note-body::before{content:'';position:absolute;left:52px;top:20px;bottom:20px;width:2px;background:rgba(220,80,80,.2)}
.s6 .note-body::after{content:'';position:absolute;bottom:0;right:0;width:24px;height:24px;background:linear-gradient(225deg,#f5f5f0 50%,rgba(0,0,0,.05) 50%);border-radius:0 0 var(--radius) 0}
.s6 .sticky{position:absolute;top:70px;right:12px;width:90px;padding:12px 10px;background:#fffde7;transform:rotate(3deg);box-shadow:2px 2px 8px rgba(0,0,0,.1);border-radius:1px;font-size:11px;color:#999;line-height:1.6;z-index:2}
.s6 .sticky::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:36px;height:10px;background:rgba(255,255,200,.7);border-radius:1px}
.s6 .note-body{padding:28px 32px 32px}
.s6 .note-title{font-size:16px;font-weight:700;color:var(--text);margin:20px 0 10px;font-style:italic;border-bottom:2px solid var(--primary);display:inline-block}
.s6 .note-content{font-size:14px;color:#444;line-height:32px;font-style:italic;padding-bottom:2px}
.s6 .nlist{list-style:none;padding:0}.s6 .nlist li{font-size:14px;color:#444;line-height:32px;padding-left:20px;position:relative;font-style:italic}.s6 .nlist li::before{content:"✎";position:absolute;left:0;color:var(--primary)}
.s6 .nphase{background:rgba(255,255,255,.6);border-radius:10px;padding:16px 18px;margin-bottom:12px;border:1px dashed var(--primary)}
.s6 .nphase h4{font-size:15px;color:var(--text);font-style:italic;margin-bottom:4px}.s6 .nphase p{font-size:13px;color:#555;line-height:1.8;font-style:italic}
.s6 .nsched{display:flex;gap:12px;align-items:baseline;padding:6px 0;border-bottom:1px dashed #ddd}
.s6 .nsched .clock{font-size:18px}.s6 .nsched .act{font-size:13px;color:#555;font-style:italic}
.s6 .nrules{background:var(--gradient);border-radius:10px;padding:16px 20px;color:#fff;text-align:center;margin-top:20px}
.s6 .nrules h4{font-size:15px;margin-bottom:6px}.s6 .nrules p{font-size:13px;opacity:.95;line-height:1.8}

/* S7 */
.s7{background:var(--light);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
.s7 .info-hero{text-align:center;margin-bottom:24px}
.s7 .info-hero h1{font-size:22px;font-weight:700;color:var(--text)}
.s7 .stats{display:flex;justify-content:center;gap:32px;margin-top:20px}
.s7 .stat-item{text-align:center}
.s7 .stat-circle{width:100px;height:100px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;position:relative}
.s7 .stat-circle .ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(var(--primary) var(--pct),#e8e8e8 var(--pct))}
.s7 .stat-circle .ring-inner{position:absolute;inset:7px;border-radius:50%;background:var(--light)}.s7 .stat-circle .inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:auto;height:auto;border-radius:50%;background:var(--light);display:flex;align-items:center;justify-content:center;position:relative;z-index:1;flex-direction:column}
.s7 .stat-circle .num{font-size:28px;font-weight:700;color:var(--text);line-height:1}.s7 .stat-circle .unit{font-size:10px;color:#888}
.s7 .stat-item .label{font-size:12px;color:#666}
.s7 .ibox{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.s7 .ibox h3{font-size:15px;color:var(--text);margin-bottom:8px}.s7 .ibox p{font-size:13px;color:#666;line-height:1.8}
.s7 .phases-row{display:flex;gap:10px;margin-bottom:20px}
.s7 .pbar{flex:1;background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.04);text-align:center}
.s7 .pbar .dc{font-size:28px;font-weight:700;color:var(--primary)}.s7 .pbar .dl{font-size:11px;color:#aaa}
.s7 .pbar h4{font-size:14px;color:#333;margin:8px 0 6px}.s7 .pbar p{font-size:12px;color:#888;line-height:1.6}
.s7 .pbar .bar{height:6px;border-radius:3px;background:#eee;margin-top:10px;overflow:hidden}
.s7 .pbar .bar-fill{height:100%;border-radius:3px;background:var(--gradient)}
.s7 .pri-row{margin-bottom:10px}.s7 .pri-row .name{font-size:13px;color:#555;margin-bottom:4px}
.s7 .pri-row .bar{height:8px;border-radius:4px;background:#eee;overflow:hidden}.s7 .pri-row .bar-fill{height:100%;border-radius:4px;background:var(--gradient)}
.s7 .srow{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.s7 .srow .badge{background:var(--gradient);color:#fff;font-size:12px;padding:5px 12px;border-radius:8px;white-space:nowrap}
.s7 .srow .task{font-size:13px;color:#555}
.s7 .irules{background:var(--gradient);border-radius:12px;padding:18px 20px;color:#fff;text-align:center}
.s7 .irules h4{font-size:16px;margin-bottom:8px}.s7 .irules p{font-size:13px;opacity:.95;line-height:1.8}

/* S8 */
.s8{background:var(--light);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}
.s8 .grid-hero{background:var(--gradient);border-radius:12px;padding:20px;color:#fff;text-align:center;margin-bottom:16px}
.s8 .grid-hero h1{font-size:20px;font-weight:700}.s8 .grid-hero p{font-size:12px;opacity:.9;margin-top:4px}
.s8 .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.s8 .gc{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.04)}
.s8 .gc.full{grid-column:1/-1}
.s8 .gc h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.s8 .gc h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--primary)}
.s8 .gc p{font-size:12px;color:#666;line-height:1.7}
.s8 .gc ul{list-style:none;padding:0}.s8 .gc ul li{font-size:12px;color:#666;padding:3px 0}.s8 .gc ul li::before{content:"▸ ";color:var(--primary)}
.s8 .gc .plabel{display:inline-block;background:var(--primary);color:#fff;font-size:11px;padding:2px 8px;border-radius:8px;margin-bottom:6px}
.s8 .gc .trow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5f5f5}
.s8 .gc .trow:last-child{border-bottom:none}.s8 .gc .trow .t{font-size:12px;color:var(--primary);font-weight:600}.s8 .gc .trow .a{font-size:12px;color:#666}
.s8 .gc.rules{background:var(--gradient);color:#fff;text-align:center}
.s8 .gc.rules h3{color:#fff;justify-content:center}.s8 .gc.rules h3 .dot{background:#fff}.s8 .gc.rules p{color:rgba(255,255,255,.95)}

.editor-panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.editor-panel h3{font-size:15px;font-weight:700;color:#333;margin-bottom:12px}
.editor-panel textarea{width:100%;height:200px;border:2px solid #e8e8e8;border-radius:10px;padding:14px;font-size:14px;font-family:var(--font);line-height:1.8;color:#333;resize:vertical;outline:none}
.editor-panel textarea:focus{border-color:var(--primary)}
.editor-panel .hint{font-size:12px;color:#999;margin-top:8px}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn-row button{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--gradient);color:#fff}
.export-bar{display:flex;gap:10px;margin-bottom:16px;padding:12px 16px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);align-items:center}
.export-bar button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:#fff;background:var(--gradient)}
.export-bar .btn-all{background:#4f6df5}
.export-bar .info{font-size:12px;color:#999;margin-left:auto}
</style>
</head>
<body>
<div class="editor-panel">
  <h3>📝 粘贴你的内容，自动生成精美排版</h3>
  <textarea id="inputText" placeholder="在这里粘贴你的内容...&#10;&#10;支持任意文本，段落之间用空行分隔"></textarea>
  <div class="hint">粘贴内容后点击「生成排版」，自动生成8种风格 × 6种配色</div>
  <div class="btn-row"><button onclick="generate()">🚀 生成排版</button></div>
</div>
<div class="controls">
  <div class="style-btns">
    <button class="style-btn active" data-s="1">经典卡片</button>
    <button class="style-btn" data-s="2">时间轴</button>
    <button class="style-btn" data-s="3">大卡片</button>
    <button class="style-btn" data-s="4">极简留白</button>
    <button class="style-btn" data-s="5">杂志风</button>
    <button class="style-btn" data-s="6">笔记本</button>
    <button class="style-btn" data-s="7">信息图</button>
    <button class="style-btn" data-s="8">网格布局</button>
  </div>
  <div class="color-dots">
    <div class="color-dot active" data-c="pink" title="暖阳粉"></div>
    <div class="color-dot" data-c="blue" title="星空蓝"></div>
    <div class="color-dot" data-c="green" title="森林绿"></div>
    <div class="color-dot" data-c="orange" title="活力橙"></div>
    <div class="color-dot" data-c="purple" title="薰衣紫"></div>
    <div class="color-dot" data-c="cyan" title="深海青"></div>
  </div>
</div>
<div class="export-bar">
  <button onclick="exportCurrent()">📸 下载当前风格</button>
  <button class="btn-all" onclick="exportAll()">📦 下载全部8种</button>
  <span class="info" id="exportInfo">粘贴内容 → 生成排版 → 下载图片</span>
</div>
<div id="contentArea"></div>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
var themes={pink:{primary:"#e8457c",light:"#fff0f3",gradient:"linear-gradient(135deg,#e8457c,#ff8fab)",text:"#a01040"},blue:{primary:"#4f6df5",light:"#eef2ff",gradient:"linear-gradient(135deg,#4f6df5,#8ba4ff)",text:"#2b3fa0"},green:{primary:"#10b981",light:"#ecfdf5",gradient:"linear-gradient(135deg,#10b981,#6ee7b7)",text:"#047857"},orange:{primary:"#f97316",light:"#fff7ed",gradient:"linear-gradient(135deg,#f97316,#fdba74)",text:"#c2410c"},purple:{primary:"#8b5cf6",light:"#f5f3ff",gradient:"linear-gradient(135deg,#8b5cf6,#c4b5fd)",text:"#5b21b6"},cyan:{primary:"#0ea5e9",light:"#f0f9ff",gradient:"linear-gradient(135deg,#0ea5e9,#7dd3fc)",text:"#0369a1"}};
var R=document.documentElement.style;
document.querySelectorAll(".style-btn").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".style-btn").forEach(function(x){x.classList.remove("active")});document.querySelectorAll(".content").forEach(function(x){x.classList.remove("active")});b.classList.add("active");var e=document.querySelector(".s"+b.dataset.s);if(e)e.classList.add("active")})});
document.querySelectorAll(".color-dot").forEach(function(d){d.addEventListener("click",function(){document.querySelectorAll(".color-dot").forEach(function(x){x.classList.remove("active")});d.classList.add("active");var t=themes[d.dataset.c];R.setProperty("--primary",t.primary);R.setProperty("--light",t.light);R.setProperty("--gradient",t.gradient);R.setProperty("--text",t.text)})});

function E(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function parse(text){
  var lines=text.split(/\n/).map(function(l){return l.trim()}).filter(function(l){return l});
  if(!lines.length)return{title:"\u8bf7\u8f93\u5165\u5185\u5bb9",sections:[]};
  var d={title:lines[0],sections:[]},sec=null;
  for(var i=1;i<lines.length;i++){
    var l=lines[i];
    if(/^\u7b2c.+\uff1a$/.test(l)||/^[\u4e00-\u9fa5a-zA-Z]{2,10}\uff1a$/.test(l)||/^[\u4e00\u4e8c\u4e09\u56db\u4e94\u516d\u4e03\u516b\u4e5d\u5341]+[\u3001.\uff0e]?$/.test(l)){
      if(sec)d.sections.push(sec);sec={title:l.replace(/[\uff1a:]$/,"").trim(),content:[],items:[]};
    }else if(/^\d+[.\u3001)\uff09]\s/.test(l)||/^[\u25c6\u25cf\u25aa\u25b8\u25a0\u2605\u25ba\u00b7\u2022\u002d\u2013\u2014]\s/.test(l)){
      if(!sec)sec={title:"\u5185\u5bb9",content:[],items:[]};sec.items.push(l.replace(/^\d+[.\u3001)\uff09]\s*|^[\u25c6\u25cf\u25aa\u25b8\u25a0\u2605\u25ba\u00b7\u2022\u002d\u2013\u2014]\s*/,""));
    }else{
      if(!sec)sec={title:"\u5185\u5bb9",content:[],items:[]};sec.content.push(l);
    }
  }
  if(sec)d.sections.push(sec);return d;
}

var emojis=["\ud83c\udfaf","\ud83d\udcc5","\u23f0","\ud83d\udca1","\ud83d\udccc","\ud83c\udfc6","\ud83d\udcaa","\u2728"];

function generate(){
  var text=document.getElementById("inputText").value.trim();
  if(!text){alert("\u8bf7\u5148\u7c98\u8d34\u5185\u5bb9");return}
  var d=parse(text),area=document.getElementById("contentArea"),out="";
  for(var si=1;si<=8;si++) out+=buildStyle(d,si);
  area.innerHTML=out;
  document.querySelectorAll(".style-btn").forEach(function(x){x.classList.remove("active")});
  document.querySelectorAll(".content").forEach(function(x){x.classList.remove("active")});
  document.querySelector(".style-btn[data-s=1]").classList.add("active");
  area.querySelector(".s1").classList.add("active");
  document.getElementById("exportInfo").textContent="\u2714\ufe0f \u5df2\u751f\u6210"+d.sections.length+"\u4e2a\u677f\u5757\u76848\u79cd\u6392\u7248";
}

function itemsHtml(s){return s.items.length?'<ul class="plist">'+s.items.map(E).map(function(x){return"<li>"+x+"</li>"}).join("")+"</ul>":""}
function itemsPriHtml(s){return s.items.length?'<ul class="mag-pri">'+s.items.map(E).map(function(x){return"<li>"+x+"</li>"}).join("")+"</ul>":""}
function contentHtml(s){return s.content.map(E).map(function(x){return"<p>"+x+"</p>"}).join("")}
function itemsBr(s){return s.items.map(E).join("<br>")}

function buildStyle(d,si){
  var cls="s"+si,active=si===1?" active":"",h=E(d.title),body="";
  d.sections.forEach(function(s,i){
    var e=emojis[i%8],t=E(s.title),it=itemsHtml(s),ip=itemsPriHtml(s),tx=contentHtml(s),ib=itemsBr(s);
    if(si===1) body+='<div class="stitle">'+e+" "+t+"</div>"+(it?'<div class="cbox">'+it+"</div>":"")+(tx?'<div class="cbox">'+tx+"</div>":"");
    else if(si===2) body+='<div class="tl-item"><span class="days">'+t+"</span><h3>"+t+"</h3>"+tx+"</div>";
    else if(si===3) body+='<div class="bc"><div class="icon">'+e+"</div><h3>"+t+"</h3>"+(ip||tx)+"</div>";
    else if(si===4) body+='<div class="minsec"><h3>'+t+"</h3>"+(ib?"<p>"+ib+"</p>":"")+tx+"</div>";
    else if(si===5) body+='<div class="mag-sec"><h3>'+t+"</h3>"+(ip||tx)+"</div>";
    else if(si===6) body+='<div class="nphase"><h4>'+e+" "+t+"</h4>"+(ib?"<p>"+ib+"</p>":"")+tx+"</div>";
    else if(si===7) body+='<div class="ibox"><h3>'+e+" "+t+"</h3>"+(ip||tx)+"</div>";
    else if(si===8){var full=s.content.join("").length>50?" full":"";body+='<div class="gc'+full+'"><h3><span class="dot"></span>'+t+"</h3>"+(it?'<ul>'+it+"</ul>":"")+tx+"</div>";}
  });
  var w="",f="";
  if(si===1) w='<div class="hero"><h1>'+h+"</h1></div>";
  else if(si===2){w='<div class="header"><h1>'+h+"</h1></div><div class=timeline>";f="</div>";}
  else if(si===3){w='<div class="bighero"><span class="emoji">\ud83d\ude80</span><h1>'+h+"</h1></div><div class=bcontent>";f="</div>";}
  else if(si===4) w='<div class="mintitle"><h1>'+h+"</h1></div>";
  else if(si===5) w='<div class="mag-header"><h1>'+h+'</h1><span class="side-text">TEXTCRAFT</span></div><div class="mag-body"><span class="side-deco">\u5185\u5bb9\u5c55\u793a</span>';f='</div><div class="mag-footer"><h4>TextCraft</h4><p>\u7cbe\u7f8e\u6392\u7248\u00b7\u4e00\u952e\u751f\u6210</p></div>';
  else if(si===6) w='<div class="note-header"><h1>'+h+'</h1><div class="tape"></div><div class="tape-2"></div></div><div class="note-body"><div class="sticky">\ud83d\udcdd TextCraft</div>';
  else if(si===7) w='<div class="info-hero"><h1>'+h+"</h1><p>"+d.sections.length+"\u4e2a\u677f\u5757</p></div>";
  else if(si===8){w='<div class="grid-hero"><h1>'+h+"</h1><p>"+d.sections.length+"\u4e2a\u677f\u5757</p></div><div class=grid>";f="</div>";}
  return '<div class="content'+active+" "+cls+'">'+w+body+f+"</div>";
}

function exportCurrent(){
  var el=document.querySelector(".content.active");if(!el){alert("\u8bf7\u5148\u751f\u6210\u6392\u7248");return}
  html2canvas(el,{scale:2,backgroundColor:"#f5f5f5",width:800}).then(function(c){var a=document.createElement("a");a.download="\u6392\u7248-"+(document.querySelector(".style-btn.active").textContent||"style")+".png";a.href=c.toDataURL("image/png");a.click()});
}
function exportAll(){
  var ns=["\u7ecf\u5178\u5361\u7247","\u65f6\u95f4\u8f74","\u5927\u5361\u7247","\u6781\u7b80\u7559\u767d","\u6742\u5fd7\u98ce","\u7b14\u8bb0\u672c","\u4fe1\u606f\u56fe","\u7f51\u683c\u5e03\u5c40"],cs=document.querySelectorAll(".content"),idx=0;
  function next(){if(idx>=cs.length){document.querySelector(".s1").classList.add("active");return}cs[idx].classList.add("active");setTimeout(function(){html2canvas(cs[idx],{scale:2,backgroundColor:"#f5f5f5",width:800}).then(function(c){var a=document.createElement("a");a.download="\u6392\u7248-"+ns[idx]+".png";a.href=c.toDataURL("image/png");a.click();cs[idx].classList.remove("active");idx++;next()})},200)}next();
}

</script>
</body></html>
