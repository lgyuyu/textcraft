<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">
<title>TextCraft - 文字排版工具</title>
<style>
:root{--primary:#e8457c;--light:#fff0f3;--gradient:linear-gradient(135deg,#e8457c,#ff8fab);--text:#a01040;--font:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;--radius:14px;--shadow:0 4px 20px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:#f5f5f5;color:#333;max-width:800px;margin:0 auto;padding:16px}
/* Editor */
.editor-panel{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.editor-panel h3{font-size:15px;font-weight:700;color:#333;margin-bottom:12px}
.editor-panel textarea{width:100%;height:160px;border:2px solid #e8e8e8;border-radius:10px;padding:14px;font-size:14px;font-family:var(--font);line-height:1.8;color:#333;resize:vertical;outline:none}
.editor-panel textarea:focus{border-color:var(--primary)}
.hint{font-size:12px;color:#999;margin-top:8px}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn-row button{padding:10px 28px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);background:var(--gradient);color:#fff}
/* Controls */
.controls{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;flex-wrap:wrap;gap:10px}
.style-btns{display:flex;gap:6px;flex-wrap:wrap}
.style-btn{padding:6px 14px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;transition:all .2s;font-family:var(--font);color:#666;white-space:nowrap}
.style-btn:hover{border-color:var(--primary);color:var(--primary)}
.style-btn.active{background:var(--gradient);color:#fff;border-color:transparent}
.color-dots{display:flex;gap:8px;align-items:center}
.color-dot{width:24px;height:24px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.color-dot:hover{transform:scale(1.15)}
.color-dot.active{border-color:#333;box-shadow:0 0 0 2px #fff,0 0 0 4px #333}
.color-dot[data-c="pink"]{background:#e8457c}
.color-dot[data-c="blue"]{background:#4f6df5}
.color-dot[data-c="green"]{background:#10b981}
.color-dot[data-c="orange"]{background:#f97316}
.color-dot[data-c="purple"]{background:#8b5cf6}
.color-dot[data-c="cyan"]{background:#0ea5e9}
/* Export bar */
.export-bar{display:flex;gap:10px;margin-bottom:16px;padding:12px 16px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);align-items:center;flex-wrap:wrap}
.export-bar button{padding:8px 20px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);color:#fff;background:var(--gradient)}
.export-bar .btn-all{background:#4f6df5}
.export-bar .info{font-size:12px;color:#999;margin-left:auto}
/* Content hidden by default */
.content{display:none}
.content.active{display:block}
/* S1 - Classic Cards */
.s1 .hero{background:var(--gradient);border-radius:var(--radius);padding:28px 24px;margin-bottom:16px;color:#fff}
.s1 .hero h1{font-size:22px;font-weight:800;line-height:1.4}
.s1 .hero p{font-size:14px;opacity:.85;margin-top:8px}
.s1 .stitle{font-size:16px;font-weight:700;color:var(--primary);margin:16px 0 10px;padding-left:12px;border-left:4px solid var(--primary)}
.s1 .card{display:flex;align-items:flex-start;gap:14px;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow)}
.s1 .card .num{width:36px;height:36px;border-radius:50%;background:var(--gradient);color:#fff;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.s1 .card h3{font-size:14px;font-weight:700;color:#222;margin-bottom:4px}
.s1 .card p{font-size:13px;color:#555;line-height:1.7}
.s1 .cbox{background:var(--light);border-radius:12px;padding:16px;margin-bottom:10px}
.s1 .cbox p{font-size:13px;color:#444;line-height:1.8;margin-bottom:6px}
.s1 .cbox ul.plist{padding-left:18px}
.s1 .cbox ul.plist li{font-size:13px;color:#444;line-height:1.8;margin-bottom:4px}
.s1 .dbox{background:var(--gradient);border-radius:12px;padding:18px;margin-top:16px;color:#fff;text-align:center}
.s1 .dbox h4{font-size:15px;font-weight:700;margin-bottom:8px}
.s1 .dbox p{font-size:13px;opacity:.9;line-height:1.7}
/* S2 - Timeline */
.s2{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
.s2 .header{background:var(--gradient);border-radius:12px;padding:20px;margin-bottom:20px;color:#fff}
.s2 .header h1{font-size:20px;font-weight:800}
.s2 .timeline{position:relative;padding-left:24px}
.s2 .timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--light)}
.s2 .tl-item{position:relative;margin-bottom:20px;padding:14px 16px;background:var(--light);border-radius:12px}
.s2 .tl-item::before{content:'';position:absolute;left:-20px;top:18px;width:12px;height:12px;border-radius:50%;background:var(--primary)}
.s2 .tl-item .days{display:inline-block;background:var(--gradient);color:#fff;font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;margin-bottom:8px}
.s2 .tl-item h3{font-size:14px;font-weight:700;color:#222;margin-bottom:6px}
.s2 .tl-item p{font-size:13px;color:#555;line-height:1.7;margin-bottom:4px}
/* S3 - Big Cards */
.s3{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.s3 .bighero{background:var(--gradient);padding:32px 24px;text-align:center;color:#fff}
.s3 .bighero .emoji{font-size:40px;display:block;margin-bottom:12px}
.s3 .bighero h1{font-size:22px;font-weight:800}
.s3 .bcontent{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.s3 .bc{background:var(--light);border-radius:12px;padding:16px}
.s3 .bc .icon{font-size:24px;margin-bottom:8px}
.s3 .bc h3{font-size:14px;font-weight:700;color:#222;margin-bottom:6px}
.s3 .bc p{font-size:12px;color:#555;line-height:1.7;margin-bottom:4px}
.s3 .footer{background:var(--gradient);padding:14px;text-align:center;color:#fff}
.s3 .footer h4{font-size:13px;font-weight:700}
/* S4 - Minimal */
.s4{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:32px}
.s4 .mintitle h1{font-size:24px;font-weight:800;color:#111;margin-bottom:12px}
.s4 .mintitle .line{height:3px;width:48px;background:var(--gradient);border-radius:2px;margin-bottom:24px}
.s4 .minsec{display:flex;gap:20px;margin-bottom:24px;align-items:flex-start}
.s4 .minsec .bignum{font-size:48px;font-weight:900;color:var(--light);line-height:1;flex-shrink:0;min-width:56px;background:linear-gradient(135deg,var(--primary),transparent);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s4 .minsec h3{font-size:15px;font-weight:700;color:#111;margin-bottom:6px}
.s4 .minsec p{font-size:13px;color:#555;line-height:1.8}
.s4 .mindiv{border:none;border-top:1px solid #f0f0f0;margin-bottom:24px}
/* S5 - Magazine */
.s5{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.s5 .mag-header{background:var(--gradient);padding:28px 24px;color:#fff;position:relative;overflow:hidden}
.s5 .mag-header h1{font-size:22px;font-weight:800;position:relative;z-index:1}
.s5 .mag-header .side-text{position:absolute;right:-10px;top:50%;transform:translateY(-50%) rotate(90deg);font-size:60px;font-weight:900;opacity:.15;letter-spacing:4px}
.s5 .mag-body{padding:20px;position:relative}
.s5 .mag-body .side-deco{position:absolute;right:16px;top:0;bottom:0;writing-mode:vertical-rl;font-size:11px;color:#ccc;letter-spacing:3px}
.s5 .mag-sec{margin-bottom:18px;padding-right:30px}
.s5 .mag-sec h3{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--light)}
.s5 .mag-sec p{font-size:13px;color:#444;line-height:1.8;margin-bottom:4px}
.s5 .mag-sec ul.mag-pri{padding-left:16px}
.s5 .mag-sec ul.mag-pri li{font-size:13px;color:#444;line-height:1.8;margin-bottom:4px}
.s5 .mag-footer{background:var(--gradient);padding:14px 24px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.s5 .mag-footer h4{font-size:14px;font-weight:700}
.s5 .mag-footer p{font-size:12px;opacity:.85}
/* S6 - Notebook */
.s6{background:#fffef5;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;background-image:repeating-linear-gradient(transparent,transparent 27px,#e8e8e8 28px);background-size:100% 28px}
.s6 .note-header{background:var(--gradient);padding:24px;color:#fff;position:relative}
.s6 .note-header h1{font-size:20px;font-weight:800}
.s6 .tape{position:absolute;top:-4px;left:40px;width:60px;height:20px;background:rgba(255,255,255,.4);border-radius:2px;transform:rotate(-2deg)}
.s6 .tape-2{position:absolute;top:-4px;right:60px;width:50px;height:20px;background:rgba(255,255,255,.3);border-radius:2px;transform:rotate(1deg)}
.s6 .note-body{padding:20px}
.s6 .sticky{display:inline-block;background:#fff9c4;padding:6px 14px;border-radius:4px;font-size:12px;font-weight:700;color:#888;margin-bottom:16px;box-shadow:2px 2px 6px rgba(0,0,0,.1);transform:rotate(-1deg)}
.s6 .nphase{margin-bottom:16px;padding:14px;background:rgba(255,255,255,.7);border-radius:8px;border-left:3px solid var(--primary)}
.s6 .nphase h4{font-size:14px;font-weight:700;color:#333;margin-bottom:6px}
.s6 .nphase p{font-size:13px;color:#555;line-height:1.8}
.s6 .nrules{background:var(--light);border-radius:8px;padding:14px;margin-top:8px}
.s6 .nrules h4{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:6px}
.s6 .nrules p{font-size:12px;color:#666;line-height:1.7}
/* S7 - Infographic */
.s7{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.s7 .info-hero{background:var(--gradient);padding:24px;color:#fff;text-align:center}
.s7 .info-hero h1{font-size:20px;font-weight:800;margin-bottom:6px}
.s7 .info-hero p{font-size:13px;opacity:.85}
.s7 .ibox{padding:16px 20px;border-bottom:1px solid #f5f5f5;display:flex;flex-direction:column;gap:8px}
.s7 .ibox h3{font-size:14px;font-weight:700;color:#222}
.s7 .ibox p{font-size:13px;color:#555;line-height:1.7}
.s7 .srow{display:flex;align-items:flex-start;gap:10px}
.s7 .srow .badge{color:var(--primary);font-size:14px;flex-shrink:0;margin-top:2px}
.s7 .srow .task{font-size:13px;color:#444;line-height:1.7}
.s7 .irules{background:var(--gradient);padding:14px;text-align:center;color:#fff}
.s7 .irules h4{font-size:13px;font-weight:700}
/* S8 - Grid */
.s8{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.s8 .grid-hero{background:var(--gradient);padding:24px;color:#fff}
.s8 .grid-hero h1{font-size:20px;font-weight:800;margin-bottom:4px}
.s8 .grid-hero p{font-size:13px;opacity:.85}
.s8 .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.s8 .gc{background:var(--light);border-radius:12px;padding:14px}
.s8 .gc.full{grid-column:1/-1}
.s8 .gc h3{font-size:13px;font-weight:700;color:#222;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.s8 .gc h3 .dot{width:8px;height:8px;border-radius:50%;background:var(--primary);flex-shrink:0}
.s8 .gc p{font-size:12px;color:#555;line-height:1.7;margin-bottom:4px}
.s8 .gc ul{padding-left:14px}
.s8 .gc ul li{font-size:12px;color:#555;line-height:1.7;margin-bottom:3px}
</style>
</head>
<body>
<div class="editor-panel">
  <h3>📝 粘贴你的内容，自动生成8种精美排版</h3>
  <textarea id="inputText" placeholder="在这里粘贴你的内容...

第一行为标题，后面为内容
支持用【】标记小标题"></textarea>
  <div class="hint">粘贴内容后点击"生成排版"，自动生成8种精美风格 · 6种配色可切换</div>
  <div class="btn-row"><button id="genBtn">🚀 生成排版</button></div>
</div>

<div class="controls">
  <div class="style-btns">
    <button class="style-btn active" data-s="1">经典卡片</button>
    <button class="style-btn" data-s="2">时间轴</button>
    <button class="style-btn" data-s="3">大卡片</button>
    <button class="style-btn" data-s="4">极简留白</button>
    <button class="style-btn" data-s="5">杂志风</button>
    <button class="style-btn" data-s="6">笔记本</button>
    <button class="style-btn" data-s="7">信息图</button>
    <button class="style-btn" data-s="8">网格布局</button>
  </div>
  <div class="color-dots">
    <div class="color-dot active" data-c="pink"></div>
    <div class="color-dot" data-c="blue"></div>
    <div class="color-dot" data-c="green"></div>
    <div class="color-dot" data-c="orange"></div>
    <div class="color-dot" data-c="purple"></div>
    <div class="color-dot" data-c="cyan"></div>
  </div>
</div>

<div class="export-bar">
  <button id="expCurBtn">📸 下载当前风格</button>
  <button class="btn-all" id="expAllBtn">📦 下载全部8种</button>
  <span class="info" id="exportInfo">输入文字 · 生成排版 · 下载图片</span>
</div>

<div id="contentArea">
  <div style="text-align:center;padding:60px 20px;color:#999">
    <div style="font-size:48px;margin-bottom:16px">📝</div>
    <p style="font-size:16px;font-weight:600;margin-bottom:8px">在上方输入任意文字</p>
    <p style="font-size:13px">点击"生成排版"即可获得8种精美排版效果</p>
  </div>
</div>

<script>
(function(){
  var themes={
    pink:{primary:'#e8457c',light:'#fff0f3',gradient:'linear-gradient(135deg,#e8457c,#ff8fab)',text:'#a01040'},
    blue:{primary:'#4f6df5',light:'#eef2ff',gradient:'linear-gradient(135deg,#4f6df5,#8ba4ff)',text:'#2b3fa0'},
    green:{primary:'#10b981',light:'#ecfdf5',gradient:'linear-gradient(135deg,#10b981,#6ee7b7)',text:'#047857'},
    orange:{primary:'#f97316',light:'#fff7ed',gradient:'linear-gradient(135deg,#f97316,#fdba74)',text:'#c2410c'},
    purple:{primary:'#8b5cf6',light:'#f5f3ff',gradient:'linear-gradient(135deg,#8b5cf6,#c4b5fd)',text:'#5b21b6'},
    cyan:{primary:'#0ea5e9',light:'#f0f9ff',gradient:'linear-gradient(135deg,#0ea5e9,#7dd3fc)',text:'#0369a1'}
  };

  function E(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  function parseText(text){
    var lines=text.split('\n').map(function(l){return l.trim()}).filter(function(l){return l.length>0});
    if(!lines.length) return null;
    var data={title:lines[0],sections:[]};
    var curSec=null;
    for(var i=1;i<lines.length;i++){
      var l=lines[i];
      var isHeader=false;
      if(/^[【\[]/.test(l)&&/[】\]]/.test(l)){isHeader=true;l=l.replace(/^[【\[]/,'').replace(/[】\]]$/,'')}
      else if(/[：:]$/.test(l)&&l.length<25){isHeader=true;l=l.replace(/[：:]$/,'')}
      else if(/^第.{1,6}[阶段周步期章节]/.test(l)){isHeader=true}
      else if(/^[一二三四五六七八九十]+[、.．]/.test(l)){isHeader=true}
      else if(/^\d+[、.．]\s*[^\d]/.test(l)&&l.length<25){isHeader=true}
      if(isHeader){
        if(curSec) data.sections.push(curSec);
        curSec={title:l.replace(/^[一二三四五六七八九十]+[、.．]\s*/,'').replace(/^\d+[、.．]\s*/,''),items:[]};
      }else{
        if(!curSec) curSec={title:'内容',items:[]};
        curSec.items.push(l);
      }
    }
    if(curSec) data.sections.push(curSec);
    if(data.sections.length===1&&data.sections[0].items.length>6){
      var items=data.sections[0].items;
      data.sections=[];
      var chunk=[];
      for(var j=0;j<items.length;j++){
        chunk.push(items[j]);
        if(chunk.length>=3||j===items.length-1){
          data.sections.push({title:chunk[0].substring(0,10),items:chunk});
          chunk=[];
        }
      }
    }
    return data;
  }

  var emojis=['🎯','📅','⏰','💡','📌','🏆','💪','✨'];
  var shapes=['circle','hex','diamond','badge','round'];

  function shape(idx){
    var t=idx%5;
    var n=idx+1;
    if(t===0) return '<div class="num">'+n+'</div>';
    if(t===1) return '<div class="num" style="clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)">'+n+'</div>';
    if(t===2) return '<div class="num" style="clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)">'+n+'</div>';
    if(t===3) return '<div class="num" style="border-radius:8px">'+n+'</div>';
    return '<div class="num" style="border-radius:10px">'+n+'</div>';
  }

  function buildS1(d){
    var h='<div class="content active s1"><div class="hero"><h1>'+E(d.title)+'</h1></div>';
    d.sections.forEach(function(s,i){
      h+='<div class="stitle">'+emojis[i%8]+' '+E(s.title)+'</div>';
      if(s.items.length<=4){
        s.items.forEach(function(item,j){h+='<div class="card">'+shape(j)+'<div><p>'+E(item)+'</p></div></div>'});
      }else{
        h+='<div class="cbox"><ul class="plist">';
        s.items.forEach(function(item){h+='<li>'+E(item)+'</li>'});
        h+='</ul></div>';
      }
    });
    h+='<div class="dbox"><h4>✨ TextCraft 精美排版</h4><p>输入任意文字 · 一键生成8种精美风格</p></div></div>';
    return h;
  }

  function buildS2(d){
    var h='<div class="content s2"><div class="header"><h1>'+E(d.title)+'</h1></div><div class="timeline">';
    d.sections.forEach(function(s,i){
      h+='<div class="tl-item"><span class="days">'+E(s.title)+'</span><h3>'+emojis[i%8]+' '+E(s.title)+'</h3>';
      s.items.forEach(function(item){h+='<p>'+E(item)+'</p>'});
      h+='</div>';
    });
    h+='</div></div>';
    return h;
  }

  function buildS3(d){
    var h='<div class="content s3"><div class="bighero"><span class="emoji">🚀</span><h1>'+E(d.title)+'</h1></div><div class="bcontent">';
    d.sections.forEach(function(s,i){
      h+='<div class="bc"><div class="icon">'+emojis[i%8]+'</div><h3>'+E(s.title)+'</h3>';
      s.items.forEach(function(item){h+='<p>'+E(item)+'</p>'});
      h+='</div>';
    });
    h+='</div><div class="footer"><h4>✨ TextCraft 精美排版</h4></div></div>';
    return h;
  }

  function buildS4(d){
    var h='<div class="content s4"><div class="mintitle"><h1>'+E(d.title)+'</h1><div class="line"></div></div>';
    d.sections.forEach(function(s,i){
      h+='<div class="minsec"><div class="bignum">'+String(i+1).padStart(2,'0')+'</div><div><h3>'+E(s.title)+'</h3><p>';
      h+=s.items.map(E).join('<br>');
      h+='</p></div></div>';
      if(i<d.sections.length-1) h+='<hr class="mindiv">';
    });
    h+='</div>';
    return h;
  }

  function buildS5(d){
    var h='<div class="content s5"><div class="mag-header"><h1>'+E(d.title)+'</h1><span class="side-text">TEXTCRAFT</span></div><div class="mag-body"><span class="side-deco">精美排版</span>';
    d.sections.forEach(function(s,i){
      h+='<div class="mag-sec"><h3>'+emojis[i%8]+' '+E(s.title)+'</h3>';
      if(s.items.length>2){
        h+='<ul class="mag-pri">';
        s.items.forEach(function(item){h+='<li>'+E(item)+'</li>'});
        h+='</ul>';
      }else{
        s.items.forEach(function(item){h+='<p>'+E(item)+'</p>'});
      }
      h+='</div>';
    });
    h+='</div><div class="mag-footer"><h4>TextCraft</h4><p>精美排版 · 一键生成</p></div></div>';
    return h;
  }

  function buildS6(d){
    var h='<div class="content s6"><div class="note-header"><h1>'+E(d.title)+'</h1><div class="tape"></div><div class="tape-2"></div></div><div class="note-body"><div class="sticky">📝 TextCraft</div>';
    d.sections.forEach(function(s,i){
      h+='<div class="nphase"><h4>'+emojis[i%8]+' '+E(s.title)+'</h4><p>';
      h+=s.items.map(E).join('<br>');
      h+='</p></div>';
    });
    h+='<div class="nrules"><h4>✨ 精美排版</h4><p>TextCraft 自动生成</p></div></div></div>';
    return h;
  }

  function buildS7(d){
    var h='<div class="content s7"><div class="info-hero"><h1>'+E(d.title)+'</h1><p>'+d.sections.length+'个板块</p></div>';
    d.sections.forEach(function(s,i){
      h+='<div class="ibox"><h3>'+emojis[i%8]+' '+E(s.title)+'</h3>';
      if(s.items.length>3){
        s.items.forEach(function(item){h+='<div class="srow"><span class="badge">▸</span><span class="task">'+E(item)+'</span></div>'});
      }else{
        s.items.forEach(function(item){h+='<p>'+E(item)+'</p>'});
      }
      h+='</div>';
    });
    h+='<div class="irules"><h4>✨ TextCraft 精美排版</h4></div></div>';
    return h;
  }

  function buildS8(d){
    var h='<div class="content s8"><div class="grid-hero"><h1>'+E(d.title)+'</h1><p>'+d.sections.length+'个板块</p></div><div class="grid">';
    d.sections.forEach(function(s,i){
      var full=s.items.join('').length>60?' full':'';
      h+='<div class="gc'+full+'"><h3><span class="dot"></span>'+E(s.title)+'</h3>';
      if(s.items.length>2){
        h+='<ul>';
        s.items.forEach(function(item){h+='<li>'+E(item)+'</li>'});
        h+='</ul>';
      }else{
        s.items.forEach(function(item){h+='<p>'+E(item)+'</p>'});
      }
      h+='</div>';
    });
    h+='</div></div>';
    return h;
  }

  // Generate function - assigned to window
  window.generate=function(){
    var text=document.getElementById('inputText').value.trim();
    if(!text){alert('请先粘贴内容');return}
    var d=parseText(text);
    if(!d||!d.sections.length){alert('未识别到内容结构，请至少输入标题和几行内容');return}
    var area=document.getElementById('contentArea');
    area.innerHTML=buildS1(d)+buildS2(d)+buildS3(d)+buildS4(d)+buildS5(d)+buildS6(d)+buildS7(d)+buildS8(d);
    document.querySelectorAll('.style-btn').forEach(function(x){x.classList.remove('active')});
    document.querySelector('.style-btn[data-s="1"]').classList.add('active');
    document.getElementById('exportInfo').textContent='✅ 已生成'+d.sections.length+'个板块的8种精美排版';
  };

  // Export current style
  window.exportCurrent=function(){
    var el=document.querySelector('.content.active');
    if(!el){alert('请先生成排版');return}
    alert('下载功能需要html2canvas库，请使用截图工具保存当前页面');
  };

  // Export all styles
  window.exportAll=function(){
    alert('批量下载功能需要html2canvas库，请逐一切换风格后截图保存');
  };

  // Bind events
  document.getElementById('genBtn').addEventListener('click',window.generate);
  document.getElementById('expCurBtn').addEventListener('click',window.exportCurrent);
  document.getElementById('expAllBtn').addEventListener('click',window.exportAll);

  // Style switching
  document.querySelectorAll('.style-btn').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('.style-btn').forEach(function(x){x.classList.remove('active')});
      document.querySelectorAll('.content').forEach(function(x){x.classList.remove('active')});
      b.classList.add('active');
      var el=document.querySelector('.s'+b.dataset.s);
      if(el) el.classList.add('active');
    });
  });

  // Color switching
  document.querySelectorAll('.color-dot').forEach(function(dot){
    dot.addEventListener('click',function(){
      document.querySelectorAll('.color-dot').forEach(function(x){x.classList.remove('active')});
      dot.classList.add('active');
      var t=themes[dot.dataset.c];
      document.documentElement.style.setProperty('--primary',t.primary);
      document.documentElement.style.setProperty('--light',t.light);
      document.documentElement.style.setProperty('--gradient',t.gradient);
      document.documentElement.style.setProperty('--text',t.text);
    });
  });

})();
</script>
</body>
</html>
